<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A-Technologies - Contact</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-pVI7Q8cF0oXBEDHiNq3A5ZkM2BEvXz74T+gkD7ZZJBQBPWPX9iPhbXWl3EUIm7ux0XK6NWEpXbJf6gXWlGN7VA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="container">
                <a href="index.html" class="logo">A-Technologies</a>
                <div class="mobile-menu-toggle">☰</div>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About Us</a></li>
                    <li><a href="services.html">Services</a></li>
                    <li><a href="careers.html">Careers</a></li>
                    <li><a href="contact.html" class="active">Contact</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <section class="contact-hero">
        <div class="container">
            <h1>Get in Touch</h1>
        </div>
    </section>

    <section class="contact-form-section">
        <div class="container two-col">
            <div class="text">
                <form action="#" method="post" class="contact-form">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required>

                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>

                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="4" required></textarea>

                    <button type="submit" class="btn primary">Send Message</button>
                </form>
                <h3>Contact Us:</h3>
                <div class="contact-info">
                    <p><strong>Email:</strong> sda@atekus.com</p>
                    <p><strong>Phone:</strong> (570) 500-0052</p>
                    <p><strong>Location:</strong> 501 E Kennedy Boulevard, Tampa, FL 33602</p>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <div class="container footer-content">
            <div class="footer-nav">
                <a href="index.html">Home</a>
                <a href="about.html">About Us</a>
                <a href="services.html">Services</a>
                <a href="careers.html">Careers</a>
                <a href="contact.html">Contact</a>
            </div>
            <p>&copy; 2026 A-Technologies. All rights reserved.</p>
        </div>
    </footer>
    <script src="js/script.js"></script>
</body>
</html>
